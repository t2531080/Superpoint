[workspace]
channels = ["conda-forge"]
name = "Superpoint"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
scipy = ">=1.5.3,<2"
python = "==3.10"
opencv = ">=4.12.0,<5"
numpy = "1.24.*"
matplotlib = ">=3.10.9,<4"
imageio = ">=2.37.0,<3"
tqdm = ">=4.68.3,<5"
pyyaml = ">=6.0.3,<7"
scikit-learn = ">=1.7.2,<2"
pytorch = ">=2.10.0,<3"
torchvision = ">=0.26.0,<0.27"
pip = ">=26.1.2,<27"

[pypi-dependencies]
torchgeometry = ">=0.1.2, <0.2"
tensorboardx = ">=2.6.5, <3"
imgaug = ">=0.4.0, <0.5"
coloredlogs = ">=15.0.1, <16"
torchsummary = ">=1.5.1, <2"
