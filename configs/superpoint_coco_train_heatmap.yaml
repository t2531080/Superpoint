data:
    # name: 'coco'
    dataset: 'CocoPanoptic'

    labels: logs/magicpoint_synth_homoAdapt_coco/predictions
    root: datasets/COCO
    root_split_txt: /datasets/COCO

    gaussian_label:
        enable: true
        params:
            GaussianBlur: {sigma: 0.2}


    cache_in_memory: false
    # Adding COCO segmentation tasks
    load_segmentation: false
    # Enable panoptic loading when training with CS-34 masks
    load_panoptic: true  # set true to train with panoptic labels
    # use grayscale masks from panoptic_cs34_* folders
    use_cs34_masks: true
    # Set to 34 when using CS-34 masks under panoptic_cs34_* folders
    num_segmentation_classes: 34
    preprocessing:
        resize: [240, 320]  # [480, 640]  # images are downsampled for training
        # resize: [480, 640]
    augmentation:
        photometric:
            enable: true
            primitives: [
                'random_brightness', 'random_contrast', 'additive_speckle_noise',
                'additive_gaussian_noise', 'additive_shade', 'motion_blur']
            params:
                random_brightness: {max_abs_change: 50}
                random_contrast: {strength_range: [0.5, 1.5]}
                additive_gaussian_noise: {stddev_range: [0, 10]}
                additive_speckle_noise: {prob_range: [0, 0.0035]}
                additive_shade:
                    transparency_range: [-0.5, 0.5]
                    kernel_size_range: [100, 150]
                motion_blur: {max_kernel_size: 3}
        homographic:
            enable: false  # not implemented
    warped_pair:
        enable: true
        params:
            translation: true
            rotation: true
            scaling: true
            perspective: true
            scaling_amplitude: 0.2
            perspective_amplitude_x: 0.2
            perspective_amplitude_y: 0.2
            patch_ratio: 0.85
            max_angle: 1.57
            allow_artifacts: true # true
        valid_border_margin: 3

front_end_model: 'Train_model_heatmap'  # 'Train_model_frontend'

training:
    workers_train: 16 # 16
    workers_val: 4 # 2

model:
    # name: 'magic_point'
    # name: 'SuperPointNet_heatmap'
    name: 'SuperPointNet_gauss2'
    params: {
    }
    detector_loss:
        loss_type: 'softmax'


    batch_size: 16 # 32
    eval_batch_size: 16 # 32
    learning_rate: 0.0001 # 0.0001
    detection_threshold: 0.015 # 0.015
    lambda_loss: 1 # 1
    lambda_segmentation: 0.5
    num_segmentation_classes: 34    
    nms: 6
    dense_loss:
        enable: false
        params:
            descriptor_dist: 4 # 4, 7.5
            lambda_d: 800 # 800
    sparse_loss:
        enable: true
        params:
            num_matching_attempts: 500
            num_masked_non_matches_per_match: 100
            lamda_d: 1
            dist: 'cos'
            method: '2d'
    other_settings: 'train 2d, gauss 0.2'
    # subpixel:
        # enable: false
        # params:
        #     subpixel_channel: 2
        # settings: 'predict flow directly'
        # loss_func: 'subpixel_loss_no_argmax' # subpixel_loss, subpixel_loss_no_argmax

retrain: True # set true for new model
reset_iter: True # set true to set the iteration number to 0
train_iter: 100000 # 170000
validation_interval: 1000 # 2000
tensorboard_interval: 200 # 200
save_interval: 2000 # 2000
validation_size: 5
truncate: 

pretrained: 



